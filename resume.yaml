profile:
  sv: >
    Marcus är en vass systemutvecklare med 20 års erfarenhet, varav flera år som egenföretagare.
    Han har byggt och driftsatt webbtjänster i stor skala och arbetat i en mängd språk och miljöer
    — på senare år med fokus på DevOps, CI/CD och moderna utvecklingsflöden.

    Marcus är driven och kan arbeta självständigt. Han är också van att leda team, agera Scrum
    Master eller på annat sätt få en grupp att fungera och leverera. Han deltar gärna i samtal om
    såväl teknisk design och arkitektur som arbetssätt och processer.

    Marcus är en strukturerad, prestigelös och kommunikativ problemlösare.
  en: >
    Marcus is a sharp software developer with 20 years of experience, including several years as
    an independent contractor. He has built and operated large-scale web services and worked across
    a wide range of languages and environments — in recent years with a focus on DevOps, CI/CD and
    modern development workflows.

    Marcus is driven and capable of working independently. He is also experienced in leading teams,
    acting as Scrum Master, or otherwise helping a group function and deliver. He enjoys discussions
    on technical design and architecture as much as ways of working and processes.

    Marcus is a structured, unpretentious and communicative problem solver.

