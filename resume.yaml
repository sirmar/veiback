  - employer: Egen (Marcus Veibäck)
    employment_type: self
    client: Pythagoras
    location: Skillingaryd
    roles:
      - title: DevOps Engineer
        start: 2024-01
        end: 2024-07
    description:
      sv: >
        Pythagoras utvecklar en webbaserad tjänst för fastighetsförvaltning. Anpassade kundens
        applikationer och införde Docker samt moderniserade verktygsstöden för kundens
        utvecklingsprocess, från lokal utveckling till deployment i målmiljön.

        Drev kundens transformering i samverkan med företagets tech lead som DevOps/systemutvecklare.
        Satte upp CI/CD pipelines i GitLab med byggen, coverage, statisk kodanalys och automatisk
        skanning efter säkerhetsbrister. Ökade kundens säkerhet genom regelbunden skanning av
        Docker images och paket samt säkrare hantering av lösenord och nycklar.

        Installerade och konfigurerade monitorering av kundens miljöer och tjänster — övervakning
        av servrar, databaser och upptid — för att kunna vidta åtgärder innan problem påverkar kunden.
      en: >
        Pythagoras develops a web-based property management service. Adapted the client's
        applications and introduced Docker, while modernising the tooling for their development
        process — from local development to deployment in the target environment.

        Drove the client's transformation together with the company's tech lead in a DevOps/developer
        role. Set up CI/CD pipelines in GitLab covering builds, coverage, static code analysis and
        automated security scanning. Improved security through regular scanning of Docker images and
        packages, and more secure handling of passwords and keys.

        Installed and configured monitoring of the client's environments and services — covering
        servers, databases and uptime — to enable action before issues impact end users.
    skills:
      - Docker
      - GitLab
      - Prometheus
      - Grafana
      - Java
      - Maven
      - JavaScript
      - Vite
      - Bash

  - employer: Westermo
    employment_type: employee
    location: Västerås
    roles:
      - title: Developer och Agile Coach
        start: 2021-08
        end: 2024-01
    description:
      sv: >
        Westermo utvecklar robusta routrar för användning i utsatta miljöer som tåg, energisystem och
        industri. Ledde ett team som utvecklade ramverk för automattest och system för att visualisera
        testresultat för routrarnas operativsystem.

        I rollen som agil coach hjälpte Marcus teamet att införa Scrum och därigenom främja ökat
        samarbete, ständig förbättring och kortare ledtider för leveranser. Som utvecklare skapade han
        verktyg för förbättrad utvecklingsmiljö, satte upp CI/CD-miljön och bidrog i teamets leveranser.
      en: >
        Westermo develops rugged routers for demanding environments such as rail, energy systems and
        industry. Led a team developing an automated test framework and a system for visualising test
        results for the routers' operating system.

        As agile coach, Marcus helped the team adopt Scrum and thereby foster greater collaboration,
        continuous improvement and shorter delivery lead times. As a developer he created tools to
        improve the development environment, set up the CI/CD pipeline and contributed to the team's
        deliveries.
    skills:
      - Python
      - Golang
      - Docker
      - Kubernetes
      - GitLab
      - Git
      - Scrum
      - Micro services

  - employer: SolarWinds/Pingdom
    employment_type: employee
    location: Västerås
    roles:
      - title: Technical Lead Developer
        start: 2019-08
        end: 2021-08
      - title: Senior Developer
        start: 2017-07
        end: 2019-08
      - title: Developer
        start: 2015-02
        end: 2017-07
    description:
      sv: >
        Som utvecklare medverkade Marcus till flertalet nya tjänster och API:er som sjösatts och
        använts av hundratusentals användare. Han ansvarade för företagets utvecklingsmiljö och
        gjorde det enkelt att, genom ett enhetligt gränssnitt, bygga och starta tjänster lokalt,
        köra tester, skapa releaser och annat som tillhör en utvecklares vardag.

        Som Scrum Master hjälpte Marcus teamet att samarbeta, fokusera och leverera rätt saker
        till kund med så korta ledtider som möjligt — genom att i samråd med produktägare och
        chefer göra klart vad som behöver göras härnäst, bryta ner uppgifter i mindre delar och
        kommunicera frågetecken och framsteg i pågående projekt. Han medverkade också till
        ständiga förbättringar av teamets processer, utvecklingsmiljö och verktyg.

        Som Agile Coach ledde Marcus workshops för Scrum Masters om hur man bäst leder team och
        hur man kan göra rutinerna i Scrum effektiva, omväxlande och roliga.
      en: >
        As a developer, Marcus contributed to numerous new services and APIs launched and used by
        hundreds of thousands of users. He was responsible for the company's development environment,
        making it easy — through a unified interface — to build and run services locally, execute
        tests, create releases and handle other everyday developer tasks.

        As Scrum Master, Marcus helped the team collaborate, focus and deliver the right things to
        customers with the shortest possible lead times — by clarifying priorities with product owners
        and managers, breaking work into smaller pieces and communicating blockers and progress. He
        also contributed to continuous improvements of the team's processes, tooling and environment.

        As Agile Coach, Marcus ran workshops for Scrum Masters on how to lead teams effectively and
        how to make Scrum ceremonies efficient, varied and enjoyable.
    skills:
