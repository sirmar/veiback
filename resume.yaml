        I tät samverkan med kundernas sakkunniga implementerade Marcus verktygsstöd för att skapa
        offerter för olika produktlinjer, och ansvarade för releaser som levererades till kunden.
      en: >
        Configura makes a graphical application that clients' sales staff use to quickly create
        accurate quotes for complex, configurable products. Marcus customised Configura for clients
        including Troax and DeLaval, gaining detailed insight into their products and conditions.

        In close collaboration with the clients' subject matter experts, Marcus implemented tooling
        to create quotes for various product lines, and was responsible for releases delivered to
        the client.
