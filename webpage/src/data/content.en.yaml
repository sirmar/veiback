about:
  heading: About me
  body: >
    Marcus is a software developer who enjoys both code and people. With 20 years in the industry he has delivered everything from
    CI/CD pipelines to agile transformations, and is equally comfortable working alone on
    a tough technical problem as leading a team.

    He likes building things that work — and finding the creative solutions that make it
    easier for others to do their best work. Technology is a means, not an end.

    He lives in Skillingaryd with his wife and two sons. Outside of work he plays and
    sings, and has long been involved in voluntary work and community leadership. He
    enjoys tending his garden and gathering family and friends around a board game.

    Consulting engagements are arranged through Kvadrat.
