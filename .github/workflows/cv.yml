name: CV CI

on:
  push:
    branches: ['**']
    paths:
      - 'cv/**'
      - 'resume.yaml'
      - '.github/workflows/cv.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'cv/**'
      - 'resume.yaml'
      - '.github/workflows/cv.yml'

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/package-ci.yml
    with:
      package: cv
      check_targets: '{"target":["lint","types","security"]}'
    secrets: inherit
